name: Release to Chrome Web Store

# Two manual actions (plus legacy tag push):
#   release  — bump version, tag, then publish
#   publish  — publish an existing tag only (no bump; use for re-runs)
#
# Logic lives in scripts/release.mjs. This file only wires Actions I/O.
# Invariant: install/test/build always run on the same git tree that is published.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      action:
        description: release = bump+tag+publish; publish = publish existing tag only
        required: true
        type: choice
        options:
          - release
          - publish
        default: release
      bump:
        description: Version bump (release action only)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      tag:
        description: Existing tag to publish (publish action only), e.g. v0.2.4. Empty = latest v* tag
        required: false
        type: string
        default: ""

concurrency:
  group: chrome-web-store-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Resolve version
        id: ver
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ inputs.action || 'release' }}
          BUMP: ${{ inputs.bump || 'patch' }}
          TAG_INPUT: ${{ inputs.tag || '' }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node scripts/release.mjs resolve

      - name: Install dependencies
        run: npm ci

      - name: Run unit and DOM tests
        run: npm test

      - name: Commit, tag, and push
        if: steps.ver.outputs.need_push == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          BASE_SHA: ${{ steps.ver.outputs.base_sha }}
        run: node scripts/release.mjs push

      - name: Build extension zip
        run: npm run build

      - name: Upload to Chrome Web Store
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: node scripts/release.mjs upload

      - name: Create GitHub release
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/release.mjs github-release
