name: Release to Chrome Web Store

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type (updates manifest.json + package.json, tags, then publishes)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

# GITHUB_TOKEN tag pushes do not re-trigger this workflow, so the
# workflow_dispatch path bumps/tags and continues into publish in the same run.
concurrency:
  group: chrome-web-store-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          # Always release from main when manually triggered.
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # For workflow_dispatch: decide the target version and bump files locally
      # (no push yet). Push happens only after tests/build succeed.
      # Re-run safety: resume without bumping when main is already ahead of the
      # store, or when a prior run left a bump commit / tag unpublished.
      - name: Prepare version (manual release)
        id: prep
        if: github.event_name == 'workflow_dispatch'
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main --tags --force
          git checkout main
          git reset --hard origin/main

          CURRENT=$(node -p "require('./manifest.json').version")

          bump_version() {
            node -e '
              const [maj, min, pat] = process.argv[1].split(".").map(Number);
              const t = process.argv[2];
              if (!Number.isInteger(maj) || !Number.isInteger(min) || !Number.isInteger(pat)) {
                throw new Error("Invalid version: " + process.argv[1]);
              }
              if (t === "major") console.log(`${maj + 1}.0.0`);
              else if (t === "minor") console.log(`${maj}.${min + 1}.0`);
              else console.log(`${maj}.${min}.${pat + 1}`);
            ' "$1" "$2"
          }

          semver_cmp() {
            # echo -1 / 0 / 1 for a<b / a==b / a>b
            node -e '
              const a = process.argv[1].split(".").map(Number);
              const b = process.argv[2].split(".").map(Number);
              for (let i = 0; i < 3; i++) {
                const x = a[i] || 0, y = b[i] || 0;
                if (x < y) { console.log(-1); process.exit(0); }
                if (x > y) { console.log(1); process.exit(0); }
              }
              console.log(0);
            ' "$1" "$2"
          }

          remote_tag_exists() {
            git ls-remote --exit-code --tags origin "refs/tags/$1" >/dev/null 2>&1
          }

          TOKEN_JSON=$(curl -fsS -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" \
            -d grant_type=refresh_token)
          ACCESS_TOKEN=$(printf '%s' "$TOKEN_JSON" | jq -r .access_token)
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to obtain access token from Chrome Web Store OAuth credentials"
            echo "$TOKEN_JSON" | jq -c '{error, error_description}' || true
            exit 1
          fi
          STORE_VERSION=$(curl -fsS \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID?projection=DRAFT" \
            | jq -r '.crxVersion // empty')
          echo "Store version: ${STORE_VERSION:-<none>} / main version: $CURRENT"

          NEED_PUSH_COMMIT=false
          NEED_PUSH_TAG=false
          RESUME=false
          RESUME_REASON=""

          if [ -n "$STORE_VERSION" ]; then
            CMP=$(semver_cmp "$CURRENT" "$STORE_VERSION")
            if [ "$CMP" -lt 0 ]; then
              echo "main version $CURRENT is behind Chrome Web Store $STORE_VERSION; refusing to publish an older build"
              exit 1
            fi
            if [ "$CMP" -gt 0 ]; then
              RESUME=true
              RESUME_REASON="main ahead of store ($CURRENT > $STORE_VERSION)"
            fi
          elif remote_tag_exists "v$CURRENT"; then
            # Store API returned no version. Resume only if GitHub Release is also
            # missing — otherwise this is a normal post-release state and we bump.
            if ! gh release view "v$CURRENT" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              RESUME=true
              RESUME_REASON="tag v$CURRENT exists but GitHub Release is missing (store version empty)"
            fi
          elif [ "$(git log -1 --pretty=%s)" = "Bump version to $CURRENT" ]; then
            # Commit reached main, tag/store publish did not finish.
            RESUME=true
            RESUME_REASON="HEAD is bump commit for $CURRENT (store version empty, no tag yet)"
          fi

          if [ "$RESUME" = "true" ]; then
            VERSION="$CURRENT"
            echo "Resuming publish for v$VERSION ($RESUME_REASON)"
            if ! remote_tag_exists "v$VERSION"; then
              NEED_PUSH_TAG=true
            fi
          else
            VERSION=$(bump_version "$CURRENT" "${{ inputs.bump }}")
            if remote_tag_exists "v$VERSION"; then
              echo "Remote tag v$VERSION already exists; refusing to bump again"
              exit 1
            fi
            node -e '
              const fs = require("fs");
              const version = process.argv[1];
              for (const file of ["manifest.json", "package.json"]) {
                const json = JSON.parse(fs.readFileSync(file, "utf8"));
                json.version = version;
                fs.writeFileSync(file, JSON.stringify(json, null, 2) + "\n");
              }
            ' "$VERSION"
            MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
            PACKAGE_VERSION=$(node -p "require('./package.json').version")
            if [ "$MANIFEST_VERSION" != "$VERSION" ] || [ "$PACKAGE_VERSION" != "$VERSION" ]; then
              echo "Version mismatch after bump: manifest=$MANIFEST_VERSION package=$PACKAGE_VERSION expected=$VERSION"
              exit 1
            fi
            NEED_PUSH_COMMIT=true
            NEED_PUSH_TAG=true
            echo "Prepared local bump $CURRENT → $VERSION (push deferred until tests pass)"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "need_push_commit=$NEED_PUSH_COMMIT" >> "$GITHUB_OUTPUT"
          echo "need_push_tag=$NEED_PUSH_TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve version (tag push)
        id: tagver
        if: github.event_name != 'workflow_dispatch'
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag $TAG does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Expose release version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ steps.prep.outputs.version }}"
            TAG="${{ steps.prep.outputs.tag }}"
          else
            VERSION="${{ steps.tagver.outputs.version }}"
            TAG="${{ steps.tagver.outputs.tag }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - name: Run unit and DOM tests
        run: npm test

      - name: Build extension zip
        run: npm run build

      # Push only after validation so a failed test cannot leave main/tags advanced.
      - name: Commit, tag, and push
        if: github.event_name == 'workflow_dispatch' && (steps.prep.outputs.need_push_commit == 'true' || steps.prep.outputs.need_push_tag == 'true')
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Re-sync in case main moved during tests/build, then re-apply the
          # known release version (avoids non-fast-forward and stash races).
          git fetch origin main --tags --force
          git checkout main
          git reset --hard origin/main

          if [ "${{ steps.prep.outputs.need_push_commit }}" = "true" ]; then
            node -e '
              const fs = require("fs");
              const version = process.argv[1];
              for (const file of ["manifest.json", "package.json"]) {
                const json = JSON.parse(fs.readFileSync(file, "utf8"));
                json.version = version;
                fs.writeFileSync(file, JSON.stringify(json, null, 2) + "\n");
              }
            ' "$VERSION"
            git add manifest.json package.json
            git commit -m "Bump version to $VERSION"
            git push origin main
          fi

          if [ "${{ steps.prep.outputs.need_push_tag }}" = "true" ]; then
            if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Remote tag $TAG already exists; skipping tag push"
            else
              git fetch origin main
              git reset --hard origin/main
              git tag -a "$TAG" -m "$TAG"
              git push origin "$TAG"
            fi
          fi
          echo "Pushed commit/tag for $TAG"

      - name: Check version already on Chrome Web Store
        id: store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN_JSON=$(curl -fsS -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" \
            -d grant_type=refresh_token)
          ACCESS_TOKEN=$(printf '%s' "$TOKEN_JSON" | jq -r .access_token)
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to obtain access token from Chrome Web Store OAuth credentials"
            echo "$TOKEN_JSON" | jq -c '{error, error_description}' || true
            exit 1
          fi
          STORE_VERSION=$(curl -fsS \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID?projection=DRAFT" \
            | jq -r '.crxVersion // empty')
          MANIFEST_VERSION="${{ steps.ver.outputs.version }}"
          echo "Store version: ${STORE_VERSION:-<none>} / Manifest version: $MANIFEST_VERSION"
          if [ -n "$STORE_VERSION" ] && [ "$STORE_VERSION" = "$MANIFEST_VERSION" ]; then
            echo "Store already has $STORE_VERSION — skipping upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload and publish to Chrome Web Store
        if: steps.store.outputs.skip != 'true'
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npx --yes chrome-webstore-upload-cli@4.0.1 upload \
            --source dist/*.zip \
            --auto-publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists — skipping."
          else
            gh release create "$RELEASE_TAG" dist/*.zip \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
