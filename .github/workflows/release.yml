name: Release to Chrome Web Store

# Two manual actions (plus legacy tag push):
#   release  — bump version, tag, then publish
#   publish  — publish an existing tag only (no bump; use for re-runs)
#
# Do one job well: versioning is separate from publishing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      action:
        description: release = bump+tag+publish; publish = publish existing tag only
        required: true
        type: choice
        options:
          - release
          - publish
        default: release
      bump:
        description: Version bump (release action only)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      tag:
        description: Existing tag to publish (publish action only), e.g. v0.2.4. Empty = latest v* tag
        required: false
        type: string
        default: ""

concurrency:
  group: chrome-web-store-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail

          remote_tag_exists() {
            git ls-remote --exit-code --tags origin "refs/tags/$1" >/dev/null 2>&1
          }

          write_version() {
            node -e '
              const fs = require("fs");
              const version = process.argv[1];
              for (const file of ["manifest.json", "package.json"]) {
                const json = JSON.parse(fs.readFileSync(file, "utf8"));
                json.version = version;
                fs.writeFileSync(file, JSON.stringify(json, null, 2) + "\n");
              }
            ' "$1"
          }

          bump_version() {
            node -e '
              const [maj, min, pat] = process.argv[1].split(".").map(Number);
              const t = process.argv[2];
              if (!Number.isInteger(maj) || !Number.isInteger(min) || !Number.isInteger(pat)) {
                throw new Error("Invalid version: " + process.argv[1]);
              }
              if (t === "major") console.log(`${maj + 1}.0.0`);
              else if (t === "minor") console.log(`${maj}.${min + 1}.0`);
              else console.log(`${maj}.${min}.${pat + 1}`);
            ' "$1" "$2"
          }

          NEED_PUSH=false

          if [ "${{ github.event_name }}" = "push" ]; then
            # Legacy: tag already pushed by hand.
            TAG="$GITHUB_REF_NAME"
            VERSION="${TAG#v}"
            MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
            if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
              echo "Tag $TAG does not match manifest version $MANIFEST_VERSION"
              exit 1
            fi

          elif [ "${{ inputs.action }}" = "publish" ]; then
            git fetch origin main --tags --force
            TAG="${{ inputs.tag }}"
            if [ -z "$TAG" ]; then
              TAG=$(git ls-remote --tags --refs origin 'refs/tags/v*' \
                | awk -F/ '{print $NF}' \
                | sort -V \
                | tail -1)
            fi
            if [ -z "$TAG" ]; then
              echo "No tag specified and no v* tags found on origin"
              exit 1
            fi
            case "$TAG" in
              v*) ;;
              *) TAG="v$TAG" ;;
            esac
            if ! remote_tag_exists "$TAG"; then
              echo "Remote tag $TAG does not exist"
              exit 1
            fi
            git checkout "$TAG"
            VERSION="${TAG#v}"
            MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
            if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
              echo "Tag $TAG does not match manifest version $MANIFEST_VERSION"
              exit 1
            fi

          else
            # action=release: bump on main tip, push after tests.
            git fetch origin main --tags --force
            git checkout main
            git reset --hard origin/main

            CURRENT=$(node -p "require('./manifest.json').version")
            VERSION=$(bump_version "$CURRENT" "${{ inputs.bump }}")
            TAG="v$VERSION"

            if remote_tag_exists "$TAG"; then
              echo "Remote tag $TAG already exists. Use action=publish to re-publish it."
              exit 1
            fi

            write_version "$VERSION"
            NEED_PUSH=true
            echo "Prepared local bump $CURRENT → $VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "need_push=$NEED_PUSH" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - name: Run unit and DOM tests
        run: npm test

      - name: Commit, tag, and push
        if: steps.ver.outputs.need_push == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Re-sync in case main moved during tests, then re-apply VERSION.
          git fetch origin main --tags --force
          git checkout main
          git reset --hard origin/main

          node -e '
            const fs = require("fs");
            const version = process.argv[1];
            for (const file of ["manifest.json", "package.json"]) {
              const json = JSON.parse(fs.readFileSync(file, "utf8"));
              json.version = version;
              fs.writeFileSync(file, JSON.stringify(json, null, 2) + "\n");
            }
          ' "$VERSION"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Remote tag $TAG appeared during the run; aborting to avoid overwrite"
            exit 1
          fi

          git add manifest.json package.json
          if git diff --cached --quiet; then
            echo "origin/main already at $VERSION"
          else
            git commit -m "Bump version to $VERSION"
            git push origin main
          fi

          git fetch origin main
          git reset --hard origin/main
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
          echo "Pushed $TAG"

      - name: Build extension zip
        run: npm run build

      - name: Upload to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"

          TOKEN_JSON=$(curl -fsS -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" \
            -d grant_type=refresh_token)
          ACCESS_TOKEN=$(printf '%s' "$TOKEN_JSON" | jq -r .access_token)
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to obtain access token from Chrome Web Store OAuth credentials"
            echo "$TOKEN_JSON" | jq -c '{error, error_description}' || true
            exit 1
          fi

          STORE_VERSION=$(curl -fsS \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID?projection=DRAFT" \
            | jq -r '.crxVersion // empty')
          echo "Store version: ${STORE_VERSION:-<none>} / releasing: $VERSION"

          if [ -n "$STORE_VERSION" ] && [ "$STORE_VERSION" = "$VERSION" ]; then
            echo "Store already has $VERSION — skipping upload."
          else
            npx --yes chrome-webstore-upload-cli@4.0.1 upload \
              --source dist/*.zip \
              --auto-publish
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists — skipping."
          else
            gh release create "$RELEASE_TAG" dist/*.zip \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
