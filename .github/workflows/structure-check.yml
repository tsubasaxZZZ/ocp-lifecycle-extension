name: Structure check

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Check page structure against extension expectations
        run: npm run check:structure

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const title = "Structure check failed: lifecycle page may have changed";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "structure-check"
            });
            if (issues.some(i => i.title === title)) {
              core.info("Issue already open, skipping");
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ["structure-check"],
              body: [
                "The scheduled structure check against the Red Hat life cycle pages failed.",
                "",
                "The rendered Life Cycle Dates tables may have changed structure,",
                "which can break the extension's highlighting. See scripts/check/targets.mjs",
                "for the monitored pages.",
                "",
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join("\n")
            });
